<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="table.css">
  <title>Table Component</title>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>Chair</td>
        <th>The Laid Back</td>
        <th>The Worker Bee</td>
        <th>The Chair 4/2</td>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th>Width</td>
        <td>80 cm</td>
        <td>60 cm</td>
        <td>220 cm</td>
      </tr>
      <tr>
        <th>Height</td>
        <td>100 cm</td>
        <td>110 cm</td>
        <td>90 cm</td>
      </tr>
      <tr>
        <th>Depth</td>
        <td>70 cm</td>
        <td>65 cm</td>
        <td>80 cm</td>
      </tr>
      <tr>
        <th>Weight</td>
        <td>16 kg</td>
        <td>22 kg</td>
        <td>80 kg</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
